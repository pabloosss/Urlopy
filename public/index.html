<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EMERLOG Urlopy - stary frontend wyłączony</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #111111, #2a0507);
      color: #1f2933;
      padding: 24px;
    }
    .card {
      width: min(620px, 100%);
      background: #ffffff;
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 18px 45px rgba(0,0,0,.22);
      border-left: 10px solid #d71920;
    }
    .logo {
      display: inline-flex;
      align-items: center;
      min-height: 54px;
      padding: 0 18px;
      border-radius: 14px;
      background: #111111;
      color: #ffffff;
      border-left: 8px solid #d71920;
      font-size: 30px;
      font-weight: 900;
      letter-spacing: .05em;
      margin-bottom: 18px;
    }
    h1 { margin: 0 0 12px; font-size: 28px; }
    p { margin: 0 0 12px; line-height: 1.5; color: #4b5563; }
    code {
      display: block;
      background: #f3f4f6;
      border: 1px solid #e5e7eb;
      padding: 12px;
      border-radius: 12px;
      margin-top: 14px;
      color: #111111;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="logo">EMERLOG</div>
    <h1>Stary frontend został wyłączony</h1>
    <p>Ten plik <b>public/index.html</b> był starą wersją aplikacji i mógł pokazywać błędne opcje pracownikowi.</p>
    <p>Aktualna aplikacja urlopowa działa przez Flask, czyli przez plik <b>app.py</b> i szablony w folderze <b>templates</b>.</p>
    <code>git pull
python app.py
http://127.0.0.1:5000</code>
  </main>
</body>
</html>
