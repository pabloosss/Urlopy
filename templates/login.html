{% extends "base.html" %}

{% block login_content %}
<div class="login-card">
    <div class="login-brand">
        <img src="{{ url_for('static', filename='emerlog-logo.png') }}" alt="EMERLOG" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
        <div class="brand-fallback login-fallback">EMERLOG</div>
        <p>Leave Manager</p>
    </div>

    <h1>Logowanie</h1>
    <p class="muted">System urlopów i nieobecności EMERLOG</p>

    <form method="post">
        <label>Login</label>
        <input type="text" name="login" required autofocus>

        <label>Hasło</label>
        <input type="password" name="password" required>

        <button type="submit">Zaloguj</button>
    </form>

    <div class="demo-box">
        <b>Konta testowe</b><br>
        jan / jan123 · anna / anna123 · ewa / ewa123 · kadry / kadry123
    </div>
</div>
{% endblock %}
