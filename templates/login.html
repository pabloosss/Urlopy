{% extends "base.html" %}

{% block content %}
<div class="login-card">
    <div class="login-brand">
        <div class="login-logo" aria-label="EMERLOG">EMERLOG</div>
        <p>Leave Manager</p>
    </div>

    <h1>Logowanie</h1>
    <p class="muted">System urlopów i nieobecności EMERLOG</p>

    <form method="post">
        <label>Login</label>
        <input type="text" name="login" required autofocus>

        <label>Hasło</label>
        <input type="password" name="password" required>

        <button type="submit">Zaloguj</button>
    </form>
</div>
{% endblock %}
